---
# BuildStream Manager Configuration
restart_state_dir: "/opt/omnia/build_stream_root/restart_state"
input_dir: "{{ hostvars['localhost']['input_project_dir'] | default('/opt/omnia/input/project_default') }}"
bsm_enabled: "{{ enable_build_stream | default(false) | bool }}"

# GitLab Configuration
gitlab_miscellaneous_dir: "miscellaneous"
gitlab_failed_nodes_file: "failed_nodes.json"
gitlab_default_status_codes:
  project_create: [200, 201]
  project_update: [200]
  runner_create: [200, 201]
  project_runners_list: [200]
  runner_delete: [202, 204]
  project_search: [200]
  api_version: [200, 401]
gitlab_root_token_expiry_days: 365

# Messages
bsm_job_id_missing_msg: >-
  [BSM] job_id is mandatory but was not provided as an extra variable.
  The playbook watcher must pass job_id via --extra-vars.
  Cannot write node_results.json without a valid job_id.

bsm_empty_inventory_msg: "[BSM] Effective inventory is empty -- no nodes to PXE boot. Skipping."

bsm_inventory_report_msg: >-
  [BSM] Inventory: {{ current_bmc_ips | length }} in CSV,
  {{ booted_ips | length }} booted (excluded),
  {{ manually_booted_ips | length }} manually booted (from failed_nodes.json),
  {{ effective_bmc_ips | length }} effective targets

bsm_artifact_paths_msg: >-
  [BSM] Artifact paths for job_id={{ bsm_job_id }}:
  node_results.json  = {{ node_results_dir }}/node_results.json |
  failed_nodes.json  = {{ node_results_dir }}/failed_nodes.json |
  restart_state.json = {{ restart_state_dir }}/{{ bsm_job_id }}/restart_state.json |
  failed_nodes.json (restart_state copy) = {{ restart_state_dir }}/{{ bsm_job_id }}/failed_nodes.json

gitlab_upload_success_msg: "[BSM] Successfully uploaded failed_nodes.json to GitLab repository at {{ gitlab_miscellaneous_dir }}/{{ gitlab_failed_nodes_file }}"

gitlab_upload_fail_msg: "[BSM] Failed to upload failed_nodes.json to GitLab repository. Check GitLab connectivity and credentials."
