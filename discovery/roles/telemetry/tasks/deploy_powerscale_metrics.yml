---

- name: Validate CSI driver PowerScale is configured
  ansible.builtin.assert:
    that:
      - hostvars['localhost']['csi_driver_powerscale_support'] | default(false) | bool
    fail_msg: "{{ ps_csi_driver_not_configured_msg }}"

- name: Set PowerScale configuration facts
  ansible.builtin.set_fact:
    ps_csm_values_path: "{{ telemetry_config.powerscale_configurations.csm_observability_values_file_path }}"
    ps_csi_secret_path: "{{ hostvars['localhost']['service_cluster_info'].csi_powerscale_driver_secret_file_path | default('') }}"
    powerscale_configurations: "{{ telemetry_config.powerscale_configurations }}"

- name: Load CSM Observability values.yaml
  block:
    - name: Read CSM Observability values.yaml
      ansible.builtin.include_vars:
        file: "{{ ps_csm_values_path }}"
        name: csm_observability_values
      no_log: true
  rescue:
    - name: Failed to read CSM Observability values.yaml
      ansible.builtin.fail:
        msg: "{{ ps_csm_values_read_fail_msg }}"

- name: Detect authentication mode from CSM Observability values
  ansible.builtin.set_fact:
    karavi_enabled: >-
      {{ csm_observability_values.karaviMetricsPowerscale.authorization.enabled | default(false) | bool }}
    karavi_proxy_host: >-
      {{ csm_observability_values.karaviMetricsPowerscale.authorization.proxyHost | default('') }}
    karavi_skip_cert_validation: >-
      {{ csm_observability_values.karaviMetricsPowerscale.authorization.skipCertificateValidation | default('true') }}

- name: Display authentication mode
  ansible.builtin.debug:
    msg: "{% if karavi_enabled | bool %}{{ ps_auth_mode_karavi_msg }}{% else %}{{ ps_auth_mode_direct_msg }}{% endif %}"

- name: Extract container image versions from CSM Observability values
  ansible.builtin.set_fact:
    csm_metrics_powerscale_image: >-
      {{ csm_observability_values.karaviMetricsPowerscale.image | default('quay.io/dell/container-storage-modules/csm-metrics-powerscale:v1.11.0') }}
    otel_collector_image: >-
      {{ csm_observability_values.otelCollector.image | default('ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector:0.146.1') }}
    nginx_proxy_image: >-
      {{ csm_observability_values.otelCollector.nginxProxy.image | default('nginxinc/nginx-unprivileged:1.29') }}
    karavi_sidecar_image: >-
      {{ csm_observability_values.karaviMetricsPowerscale.authorization.sidecarProxy.image
      | default('quay.io/dell/container-storage-modules/csm-authorization-sidecar:v2.4.0') }}

- name: Load CSI PowerScale credentials from vault
  block:
    - name: Read CSI driver secret.yaml
      ansible.builtin.include_vars:
        file: "{{ ps_csi_secret_path }}"
        name: csi_powerscale_secret
      no_log: true

    - name: Extract isilon clusters from secret
      ansible.builtin.set_fact:
        ps_clusters: "{{ csi_powerscale_secret.isilonClusters | default([]) }}"
      no_log: true
  rescue:
    - name: Failed to load CSI PowerScale credentials
      ansible.builtin.fail:
        msg: "{{ ps_csi_secret_read_fail_msg }}"

- name: Fail if no PowerScale clusters defined
  ansible.builtin.fail:
    msg: "{{ ps_no_clusters_found_msg }}"
  when: ps_clusters | length == 0

- name: Display PowerScale clusters found
  ansible.builtin.debug:
    msg: "{{ ps_clusters_found_msg }}"

- name: Generate per-cluster manifests
  ansible.builtin.include_tasks: deploy_powerscale_cluster.yml
  loop: "{{ ps_clusters }}"
  loop_control:
    index_var: cluster_index
    loop_var: ps_cluster
