---

- name: Set per-cluster variables for cluster{{ cluster_index }}
  ansible.builtin.set_fact:
    ps_cluster_name: "{{ ps_cluster.clusterName | default('cluster' + cluster_index | string) }}"
    ps_cluster_endpoint: "{{ ps_cluster.endpoint | default('') }}"
    ps_username: "{{ ps_cluster.username | default('') }}"
    ps_password: "{{ ps_cluster.password | default('') }}"
  no_log: true

- name: Display cluster{{ cluster_index }} info
  ansible.builtin.debug:
    msg: "Generating manifests for PowerScale cluster '{{ ps_cluster_name }}' (index: {{ cluster_index }})"

- name: Generate OTEL Collector manifests for cluster{{ cluster_index }}
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ powerscale_deployments_dir }}/{{ item.dest }}"
    mode: "{{ dir_permissions_755 }}"
  loop:
    - src: "telemetry/powerscale/otel-collector-config.yaml.j2"
      dest: "otel-collector-powerscale-config-cluster{{ cluster_index }}.yaml"
    - src: "telemetry/powerscale/otel-collector-deployment.yaml.j2"
      dest: "otel-collector-powerscale-deployment-cluster{{ cluster_index }}.yaml"
    - src: "telemetry/powerscale/otel-collector-service.yaml.j2"
      dest: "otel-collector-powerscale-service-cluster{{ cluster_index }}.yaml"
    - src: "telemetry/powerscale/otel-collector-pvc.yaml.j2"
      dest: "otel-collector-powerscale-pvc-cluster{{ cluster_index }}.yaml"

- name: Generate CSM Metrics ConfigMap for cluster{{ cluster_index }}
  ansible.builtin.template:
    src: "telemetry/powerscale/csm-metrics-config.yaml.j2"
    dest: "{{ powerscale_deployments_dir }}/csm-metrics-powerscale-config-cluster{{ cluster_index }}.yaml"
    mode: "{{ dir_permissions_755 }}"

- name: Generate CSM Metrics Deployment for cluster{{ cluster_index }} (Direct Auth)
  ansible.builtin.template:
    src: "telemetry/powerscale/csm-metrics-deployment-direct.yaml.j2"
    dest: "{{ powerscale_deployments_dir }}/csm-metrics-powerscale-deployment-direct-cluster{{ cluster_index }}.yaml"
    mode: "{{ dir_permissions_755 }}"
  when: not (karavi_enabled | bool)

- name: Generate CSM Metrics Deployment for cluster{{ cluster_index }} (Karavi Auth)
  ansible.builtin.template:
    src: "telemetry/powerscale/csm-metrics-deployment-karavi.yaml.j2"
    dest: "{{ powerscale_deployments_dir }}/csm-metrics-powerscale-deployment-karavi-cluster{{ cluster_index }}.yaml"
    mode: "{{ dir_permissions_755 }}"
  when: karavi_enabled | bool

- name: Generate PowerScale secret for cluster{{ cluster_index }}
  ansible.builtin.template:
    src: "telemetry/powerscale/powerscale-secret.yaml.j2"
    dest: "{{ powerscale_deployments_dir }}/powerscale-secret.yaml"
    mode: "{{ dir_permissions_755 }}"
  no_log: true
