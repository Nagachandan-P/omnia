# deploy_powerscale_helm.yml
# Deploys CSM Observability (karavi-observability) via Helm chart for PowerScale telemetry.
# Air-gapped: Uses locally cloned dell/helm-charts git repository from Pulp mirror on NFS share.
# User-provided values file is passed directly to helm install -f (no template generation).
# Follows the same offline pattern as CSI driver PowerScale installation.
# Namespaces (csm_namespace, csi_driver_namespace) are internal constants from vars/main.yml.

- name: Create CSM Observability namespace
  kubernetes.core.k8s:
    api_version: v1
    kind: Namespace
    name: "{{ csm_namespace }}"
    state: present

- name: Apply cert-manager CRDs from cloned karavi-observability repo
  kubernetes.core.k8s:
    src: "{{ karavi_cert_manager_crds_path }}"
    state: present
    validate:
      fail_on_error: false

# --- Copy CSI Driver Secrets to CSM Namespace (Direct Authentication) ---

- name: Copy isilon-creds secret to CSM Observability namespace
  ansible.builtin.shell: |
    kubectl get secret isilon-creds \
      -n {{ csi_driver_namespace }} -o yaml \
      | sed 's/namespace: {{ csi_driver_namespace }}/namespace: {{ csm_namespace }}/' \
      | kubectl apply -f -
  no_log: true
  register: copy_secret_result
  failed_when: copy_secret_result.rc != 0
  changed_when: "'created' in copy_secret_result.stdout or 'configured' in copy_secret_result.stdout"

# --- Copy Karavi Authorization Resources (if enabled) ---

- name: Copy Karavi Authorization resources to CSM namespace
  when: karavi_enabled | default(false) | bool
  block:
    - name: Copy isilon-config-params ConfigMap
      ansible.builtin.shell: |
        kubectl get configmap isilon-config-params \
          -n {{ csi_driver_namespace }} -o yaml \
          | sed 's/namespace: {{ csi_driver_namespace }}/namespace: {{ csm_namespace }}/' \
          | kubectl apply -f -

    - name: Copy proxy-server-root-certificate and proxy-authz-tokens secrets
      ansible.builtin.shell: |
        kubectl get secret proxy-server-root-certificate proxy-authz-tokens \
          -n {{ csi_driver_namespace }} -o yaml \
          | sed 's/namespace: {{ csi_driver_namespace }}/namespace: {{ csm_namespace }}/' \
          | sed 's/name: proxy-server-root-certificate/name: isilon-proxy-server-root-certificate/' \
          | sed 's/name: proxy-authz-tokens/name: isilon-proxy-authz-tokens/' \
          | kubectl apply -f -
      no_log: true

# --- Copy user-provided values file to NFS share ---

- name: Copy user-provided Helm values file to NFS share
  ansible.builtin.copy:
    src: "{{ ps_helm_values_file }}"
    dest: "{{ k8s_client_mount_path }}/karavi-observability/myvalues.yaml"
    mode: '0600'

# --- Helm Install / Upgrade from local chart on NFS share ---

- name: Check if karavi-observability Helm release exists
  ansible.builtin.shell: >
    helm list -n {{ csm_namespace }} --filter karavi-observability -q
  register: helm_release_check
  changed_when: false
  failed_when: false

- name: Install karavi-observability Helm chart from NFS share (fresh install)
  ansible.builtin.shell: >
    helm install karavi-observability
    {{ karavi_helm_chart_path }}
    -n {{ csm_namespace }}
    -f {{ k8s_client_mount_path }}/karavi-observability/myvalues.yaml
    --wait --timeout 10m
  when: helm_release_check.stdout | trim | length == 0
  register: helm_install_result

- name: Upgrade karavi-observability Helm chart from NFS share (existing release)
  ansible.builtin.shell: >
    helm upgrade karavi-observability
    {{ karavi_helm_chart_path }}
    -n {{ csm_namespace }}
    -f {{ k8s_client_mount_path }}/karavi-observability/myvalues.yaml
    --wait --timeout 10m
  when: helm_release_check.stdout | trim | length > 0
  register: helm_upgrade_result

- name: Display Helm deployment result
  ansible.builtin.debug:
    msg: >-
      CSM Observability (karavi-observability) Helm chart deployed successfully
      in namespace '{{ csm_namespace }}'.
      Release status: {{ 'installed' if (helm_release_check.stdout | trim | length == 0) else 'upgraded' }}
