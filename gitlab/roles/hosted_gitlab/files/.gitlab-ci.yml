#
# BuildStream CI/CD Pipeline Entry Point
#
# This file is the main CI configuration that routes to the appropriate
# pipeline based on the PIPELINE_TYPE variable or file changes.
#
# Usage:
#   - Auto-triggered by file changes (catalog_rhel.json -> build, pxe_mapping_file.csv -> deploy)
#   - Manual trigger: Set PIPELINE_TYPE variable to "build" or "deploy"
#   - API trigger: Set PIPELINE_TYPE variable to "build" or "deploy"
# ---------------------------------------------------------------------------

workflow:
  rules:
    - if: '$PIPELINE_TYPE == "build"'
    - if: '$PIPELINE_TYPE == "deploy"'
    - changes:
        - catalog_rhel.json
        - input/pxe_mapping_file.csv

stages:
  - pipeline_selection

# Build Pipeline Selection
build_pipeline:
  stage: pipeline_selection
  trigger:
    include: .gitlab-ci-build.yml
    strategy: depend
  rules:
    - if: '$PIPELINE_TYPE == "build"'
    - changes:
        - catalog_rhel.json
    - when: never

# Deploy Pipeline Selection
deploy_pipeline:
  stage: pipeline_selection
  trigger:
    include: .gitlab-ci-deploy.yml
    strategy: depend
  rules:
    - if: '$PIPELINE_TYPE == "deploy"'
    - changes:
        - input/pxe_mapping_file.csv
    - when: never
