---

- name: Validate VictoriaLogs Deployment
  when: "'victoria' in hostvars['localhost']['telemetry_collection_type'].split(',')"
  block:
    - name: Set VictoriaLogs validation facts
      ansible.builtin.set_fact:
        vl_namespace: "{{ telemetry_namespace }}"
        vlcluster_name: victoria-logs-cluster
        vlagent_name: vlagent
        vlinsert_service: vlinsert-victoria-logs-cluster
        vlselect_service: vlselect-victoria-logs-cluster
        vlagent_service: vlagent-vlagent
        vlinsert_port: "9481"
        vlselect_port: "9471"
        vlagent_http_port: "9429"
        vlagent_syslog_port: "514"
        vlagent_syslog_tls_port: "6514"

    - name: Validate VLCluster CR exists
      ansible.builtin.command:
        cmd: kubectl get vlcluster {{ vlcluster_name }} -n {{ vl_namespace }} -o jsonpath='{.metadata.name}'
      register: vlcluster_check
      changed_when: false
      ignore_errors: true
      delegate_to: "{{ kube_vip }}"

    - name: Report VLCluster CR validation failure
      ansible.builtin.fail:
        msg: |
          VALIDATION FAILED: VLCluster CR not found
          Component: VLCluster
          Name: {{ vlcluster_name }}
          Namespace: {{ vl_namespace }}
          Expected: VLCluster CR should exist
          Actual: VLCluster CR does not exist
          Action: Check if VictoriaLogs templates were generated and applied correctly
      when: vlcluster_check.rc != 0 or vlcluster_check.stdout != vlcluster_name

    - name: Validate VLAgent CR exists
      ansible.builtin.command:
        cmd: kubectl get vlagent {{ vlagent_name }} -n {{ vl_namespace }} -o jsonpath='{.metadata.name}'
      register: vlagent_check
      changed_when: false
      ignore_errors: true
      delegate_to: "{{ kube_vip }}"

    - name: Report VLAgent CR validation failure
      ansible.builtin.fail:
        msg: |
          VALIDATION FAILED: VLAgent CR not found
          Component: VLAgent
          Name: {{ vlagent_name }}
          Namespace: {{ vl_namespace }}
          Expected: VLAgent CR should exist
          Actual: VLAgent CR does not exist
          Action: Check if VictoriaLogs templates were generated and applied correctly
      when: vlagent_check.rc != 0 or vlagent_check.stdout != vlagent_name

    - name: Validate VLAgent ConfigMap exists
      ansible.builtin.command:
        cmd: kubectl get configmap vlagent-config -n {{ vl_namespace }} -o jsonpath='{.metadata.name}'
      register: vlagent_configmap_check
      changed_when: false
      ignore_errors: true
      delegate_to: "{{ kube_vip }}"

    - name: Report VLAgent ConfigMap validation failure
      ansible.builtin.fail:
        msg: |
          VALIDATION FAILED: VLAgent ConfigMap not found
          Component: VLAgent ConfigMap
          Name: vlagent-config
          Namespace: {{ vl_namespace }}
          Expected: ConfigMap should exist
          Actual: ConfigMap does not exist
          Action: Check if VictoriaLogs templates were generated and applied correctly
      when: vlagent_configmap_check.rc != 0 or vlagent_configmap_check.stdout != 'vlagent-config'

    - name: Wait for vlstorage pods to be ready
      ansible.builtin.command:
        cmd: kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=vlstorage -n {{ vl_namespace }} --timeout=10m
      register: vlstorage_pods_wait
      changed_when: false
      ignore_errors: true
      delegate_to: "{{ kube_vip }}"

    - name: Report vlstorage pod validation failure
      ansible.builtin.fail:
        msg: |
          VALIDATION FAILED: vlstorage pods not ready
          Component: vlstorage
          Namespace: {{ vl_namespace }}
          Expected: All vlstorage pods should be in Ready state
          Actual: vlstorage pods did not become ready within 10 minutes
          Action: Check pod logs: kubectl logs -n {{ vl_namespace }} -l app.kubernetes.io/name=vlstorage
                  Check pod status: kubectl get pods -n {{ vl_namespace }} -l app.kubernetes.io/name=vlstorage
      when: vlstorage_pods_wait.rc != 0

    - name: Wait for vlinsert pods to be ready
      ansible.builtin.command:
        cmd: kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=vlinsert -n {{ vl_namespace }} --timeout=5m
      register: vlinsert_pods_wait
      changed_when: false
      ignore_errors: true
      delegate_to: "{{ kube_vip }}"

    - name: Report vlinsert pod validation failure
      ansible.builtin.fail:
        msg: |
          VALIDATION FAILED: vlinsert pods not ready
          Component: vlinsert
          Namespace: {{ vl_namespace }}
          Expected: All vlinsert pods should be in Ready state
          Actual: vlinsert pods did not become ready within 5 minutes
          Action: Check pod logs: kubectl logs -n {{ vl_namespace }} -l app.kubernetes.io/name=vlinsert
                  Check pod status: kubectl get pods -n {{ vl_namespace }} -l app.kubernetes.io/name=vlinsert
      when: vlinsert_pods_wait.rc != 0

    - name: Wait for vlselect pods to be ready
      ansible.builtin.command:
        cmd: kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=vlselect -n {{ vl_namespace }} --timeout=5m
      register: vlselect_pods_wait
      changed_when: false
      ignore_errors: true
      delegate_to: "{{ kube_vip }}"

    - name: Report vlselect pod validation failure
      ansible.builtin.fail:
        msg: |
          VALIDATION FAILED: vlselect pods not ready
          Component: vlselect
          Namespace: {{ vl_namespace }}
          Expected: All vlselect pods should be in Ready state
          Actual: vlselect pods did not become ready within 5 minutes
          Action: Check pod logs: kubectl logs -n {{ vl_namespace }} -l app.kubernetes.io/name=vlselect
                  Check pod status: kubectl get pods -n {{ vl_namespace }} -l app.kubernetes.io/name=vlselect
      when: vlselect_pods_wait.rc != 0

    - name: Wait for VLAgent pod to be ready
      ansible.builtin.command:
        cmd: kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=vlagent -n {{ vl_namespace }} --timeout=5m
      register: vlagent_pods_wait
      changed_when: false
      ignore_errors: true
      delegate_to: "{{ kube_vip }}"

    - name: Report VLAgent pod validation failure
      ansible.builtin.fail:
        msg: |
          VALIDATION FAILED: VLAgent pod not ready
          Component: VLAgent
          Namespace: {{ vl_namespace }}
          Expected: VLAgent pod should be in Ready state
          Actual: VLAgent pod did not become ready within 5 minutes
          Action: Check pod logs: kubectl logs -n {{ vl_namespace }} -l app.kubernetes.io/name=vlagent
                  Check pod status: kubectl get pods -n {{ vl_namespace }} -l app.kubernetes.io/name=vlagent
      when: vlagent_pods_wait.rc != 0

    - name: Get vlinsert service endpoint
      ansible.builtin.command:
        cmd: kubectl get svc {{ vlinsert_service }} -n {{ vl_namespace }} -o jsonpath='{.spec.clusterIP}'
      register: vlinsert_service_endpoint
      changed_when: false
      ignore_errors: true
      delegate_to: "{{ kube_vip }}"

    - name: Report vlinsert service validation failure
      ansible.builtin.fail:
        msg: |
          VALIDATION FAILED: vlinsert service not found
          Component: vlinsert Service
          Name: {{ vlinsert_service }}
          Namespace: {{ vl_namespace }}
          Expected: Service should exist and have cluster IP
          Actual: Service not found or no cluster IP assigned
          Action: Check service status: kubectl get svc -n {{ vl_namespace }} {{ vlinsert_service }}
      when: vlinsert_service_endpoint.rc != 0 or vlinsert_service_endpoint.stdout == ''

    - name: Get vlselect service endpoint
      ansible.builtin.command:
        cmd: kubectl get svc {{ vlselect_service }} -n {{ vl_namespace }} -o jsonpath='{.spec.clusterIP}'
      register: vlselect_service_endpoint
      changed_when: false
      ignore_errors: true
      delegate_to: "{{ kube_vip }}"

    - name: Report vlselect service validation failure
      ansible.builtin.fail:
        msg: |
          VALIDATION FAILED: vlselect service not found
          Component: vlselect Service
          Name: {{ vlselect_service }}
          Namespace: {{ vl_namespace }}
          Expected: Service should exist and have cluster IP
          Actual: Service not found or no cluster IP assigned
          Action: Check service status: kubectl get svc -n {{ vl_namespace }} {{ vlselect_service }}
      when: vlselect_service_endpoint.rc != 0 or vlselect_service_endpoint.stdout == ''

    - name: Get VLAgent service endpoint
      ansible.builtin.command:
        cmd: kubectl get svc {{ vlagent_service }} -n {{ vl_namespace }} -o jsonpath='{.spec.clusterIP}'
      register: vlagent_service_endpoint
      changed_when: false
      ignore_errors: true
      delegate_to: "{{ kube_vip }}"

    - name: Report VLAgent service validation failure
      ansible.builtin.fail:
        msg: |
          VALIDATION FAILED: VLAgent service not found
          Component: VLAgent Service
          Name: {{ vlagent_service }}
          Namespace: {{ vl_namespace }}
          Expected: Service should exist and have cluster IP
          Actual: Service not found or no cluster IP assigned
          Action: Check service status: kubectl get svc -n {{ vl_namespace }} {{ vlagent_service }}
      when: vlagent_service_endpoint.rc != 0 or vlagent_service_endpoint.stdout == ''

    - name: Validate vlinsert service connectivity
      ansible.builtin.command:
        cmd: kubectl run -n {{ vl_namespace }} vlinsert-test --image=busybox:1.28 --rm -i --restart=Never --command -- wget -q -O- --no-check-certificate https://{{ vlinsert_service }}:{{ vlinsert_port }}/health
      register: vlinsert_health_check
      changed_when: false
      ignore_errors: true
      delegate_to: "{{ kube_vip }}"

    - name: Report vlinsert service connectivity failure
      ansible.builtin.debug:
        msg: |
          WARNING: vlinsert service connectivity check failed
          Component: vlinsert Service
          Namespace: {{ vl_namespace }}
          Service: {{ vlinsert_service }}:{{ vlinsert_port }}
          Note: Service is running but connectivity test failed (this is non-fatal)
          Action: Check pod logs: kubectl logs -n {{ vl_namespace }} -l app.kubernetes.io/name=vlinsert
      when: vlinsert_health_check.rc != 0

    - name: Validate vlselect service connectivity
      ansible.builtin.command:
        cmd: kubectl run -n {{ vl_namespace }} vlselect-test --image=busybox:1.28 --rm -i --restart=Never --command -- wget -q -O- --no-check-certificate https://{{ vlselect_service }}:{{ vlselect_port }}/health
      register: vlselect_health_check
      changed_when: false
      ignore_errors: true
      delegate_to: "{{ kube_vip }}"

    - name: Report vlselect service connectivity failure
      ansible.builtin.debug:
        msg: |
          WARNING: vlselect service connectivity check failed
          Component: vlselect Service
          Namespace: {{ vl_namespace }}
          Service: {{ vlselect_service }}:{{ vlselect_port }}
          Note: Service is running but connectivity test failed (this is non-fatal)
          Action: Check pod logs: kubectl logs -n {{ vl_namespace }} -l app.kubernetes.io/name=vlselect
      when: vlselect_health_check.rc != 0

    - name: Validate VLAgent service connectivity
      ansible.builtin.command:
        cmd: kubectl run -n {{ vl_namespace }} vlagent-test --image=busybox:1.28 --rm -i --restart=Never --command -- wget -q -O- http://{{ vlagent_service }}:{{ vlagent_http_port }}/health
      register: vlagent_health_check
      changed_when: false
      ignore_errors: true
      delegate_to: "{{ kube_vip }}"

    - name: Report VLAgent service connectivity failure
      ansible.builtin.debug:
        msg: |
          WARNING: VLAgent service connectivity check failed
          Component: VLAgent Service
          Namespace: {{ vl_namespace }}
          Service: {{ vlagent_service }}:{{ vlagent_http_port }}
          Note: Service is running but connectivity test failed (this is non-fatal)
          Action: Check pod logs: kubectl logs -n {{ vl_namespace }} -l app.kubernetes.io/name=vlagent
      when: vlagent_health_check.rc != 0

    - name: Check VLAgent pod status
      ansible.builtin.command:
        cmd: kubectl get pods -n {{ vl_namespace }} -l app.kubernetes.io/name=vlagent -o jsonpath='{.items[0].status.phase}'
      register: vlagent_pod_status
      changed_when: false
      ignore_errors: true
      delegate_to: "{{ kube_vip }}"

    - name: Report VLAgent pod status
      ansible.builtin.debug:
        msg: |
          VLAgent pod status: {{ vlagent_pod_status.stdout | default('Unknown') }}
          Note: Syslog receiver validation skipped (requires netstat in container)
      when: vlagent_pod_status.rc == 0


    - name: VictoriaLogs deployment validation successful
      ansible.builtin.debug:
        msg: |
          VICTORIALOGS DEPLOYMENT VALIDATION SUCCESSFUL
          ==============================================
          Component: VictoriaLogs Cluster
          Namespace: {{ vl_namespace }}
          
          Validated Components:
          - VLCluster CR: {{ vlcluster_name }} ✓
          - VLAgent CR: {{ vlagent_name }} ✓
          - VLAgent ConfigMap: vlagent-config ✓
          - vlstorage pods: Ready ✓
          - vlinsert pods: Ready ✓
          - vlselect pods: Ready ✓
          - VLAgent pod: Ready ✓
          - vlinsert service: {{ vlinsert_service_endpoint.stdout }} ✓
          - vlselect service: {{ vlselect_service_endpoint.stdout }} ✓
          - VLAgent service: {{ vlagent_service_endpoint.stdout }} ✓
          
          All VictoriaLogs components are deployed and operational!
