# Configure PowerScale syslog collection via rsyslog relay + shared VLAgent
# Gated by: telemetry_sources.powerscale.logs_enabled
#
# DATA PIPELINE (supports both UDP and TLS modes):
#   UDP mode: PowerScale (UDP:514) → K8s node rsyslog → VLAgent LB (TCP:514) → VictoriaLogs
#   TLS mode: PowerScale (TLS:6514) → VLAgent LB (TLS:6514) → VictoriaLogs
#
# What Omnia does (all on K8s cluster):
#   - Uses powerscale_syslog_source_ips from user config (syslog source != CSI endpoint)
#   - Configures rsyslog on ALL K8s nodes (UDP listener, filter by PS IP, forward to VLAgent)
#   - Generates TLS certificates for syslog TLS receiver (CA + server cert)
#   - Opens firewall port 514/udp on all K8s nodes
#   - VLAgent listens on TCP:514 (rsyslog relay) and TLS:6514 (direct PowerScale TLS)
#
# What Omnia does NOT do:
#   - Omnia does NOT configure PowerScale directly
#   - User must configure PowerScale to send syslog (UDP or TLS) to VLAgent LoadBalancer IP

- name: Set PowerScale log configuration facts
  ansible.builtin.set_fact:
    ps_log_enabled: "{{ telemetry_config.telemetry_sources.powerscale.logs_enabled | default(false) | bool }}"

- name: Display PowerScale log collection status
  ansible.builtin.debug:
    msg: "{% if ps_log_enabled | bool %}{{ ps_log_enabled_msg }}{% else %}{{ ps_log_disabled_msg }}{% endif %}"
    verbosity: 2

- name: Configure rsyslog relay and VLAgent for PowerScale syslog collection
  when: ps_log_enabled | bool
  block:
    - name: Validate VictoriaLogs is in collection_targets
      ansible.builtin.assert:
        that:
          - "'victoria_logs' in telemetry_config.telemetry_sources.powerscale.collection_targets | default([])"
        fail_msg: >-
          PowerScale log collection requires 'victoria_logs' in
          telemetry_sources.powerscale.collection_targets.

    # --- Get PowerScale syslog source IPs from user configuration ---
    # These are the IPs PowerScale uses to SEND syslog (often data pool IP, not mgmt IP).
    # User must configure these in powerscale_configurations.syslog_source_ips
    - name: Set PowerScale syslog source IPs
      ansible.builtin.set_fact:
        powerscale_management_ips: "{{ telemetry_config.powerscale_configurations.syslog_source_ips | default([]) }}"

    - name: Fail if no PowerScale syslog source IPs configured
      ansible.builtin.fail:
        msg: >-
          powerscale_configurations.syslog_source_ips is required when
          logs_enabled is true. Provide the IP(s) from which PowerScale sends syslog.
          This is often the data pool IP (e.g., 40gige-1 interface), NOT the CSI
          management IP. Check OneFS Network Configuration → External Network → Pool IPs.
      when: powerscale_management_ips | length == 0

    - name: Display PowerScale syslog source IPs for rsyslog filtering
      ansible.builtin.debug:
        msg: >-
          PowerScale syslog source IP(s): {{ powerscale_management_ips | join(', ') }}.
          rsyslog $fromhost-ip filter will match these IPs and forward to VLAgent.

    # --- Generate TLS certificates for syslog TLS receiver (port 6514) ---
    - name: Set TLS enabled fact
      ansible.builtin.set_fact:
        ps_syslog_tls_enabled: "{{ telemetry_config.powerscale_configurations.syslog_tls_enabled | default(true) | bool }}"

    - name: Display TLS mode status
      ansible.builtin.debug:
        msg: "PowerScale syslog TLS mode: {% if ps_syslog_tls_enabled | bool %}enabled{% else %}disabled{% endif %}"

    - name: Create syslog TLS certificate directory
      ansible.builtin.file:
        path: "{{ syslog_tls_cert_dir }}"
        state: directory
        mode: "{{ hostvars['localhost']['dir_permissions_755'] }}"
      when: ps_syslog_tls_enabled | bool

    - name: Deploy syslog TLS certificate generation script
      ansible.builtin.template:
        src: telemetry/victoria/gen_syslog_tls_certs.sh.j2
        dest: "{{ hostvars['localhost']['k8s_client_share_path'] }}/telemetry/deployments/gen_syslog_tls_certs.sh"
        mode: "{{ hostvars['localhost']['file_permissions_755'] }}"
      when: ps_syslog_tls_enabled | bool

    - name: Generate syslog TLS certificates (CA + server cert)
      ansible.builtin.command:
        cmd: "{{ hostvars['localhost']['k8s_client_share_path'] }}/telemetry/deployments/gen_syslog_tls_certs.sh"
      changed_when: false
      when: ps_syslog_tls_enabled | bool

    - name: Read syslog TLS server certificate
      ansible.builtin.slurp:
        src: "{{ syslog_tls_cert_dir }}/server.crt"
      register: syslog_server_cert
      no_log: true
      when: ps_syslog_tls_enabled | bool

    - name: Read syslog TLS server key
      ansible.builtin.slurp:
        src: "{{ syslog_tls_cert_dir }}/server.key"
      register: syslog_server_key
      no_log: true
      when: ps_syslog_tls_enabled | bool

    - name: Read syslog TLS CA certificate
      ansible.builtin.slurp:
        src: "{{ syslog_tls_cert_dir }}/ca.crt"
      register: syslog_ca_cert
      no_log: true
      when: ps_syslog_tls_enabled | bool

    - name: Set syslog TLS certificate variables for template
      ansible.builtin.set_fact:
        syslog_server_cert_b64: "{{ syslog_server_cert.content }}"
        syslog_server_key_b64: "{{ syslog_server_key.content }}"
        syslog_ca_cert_b64: "{{ syslog_ca_cert.content }}"
      no_log: true
      when: ps_syslog_tls_enabled | bool

    - name: Create syslog TLS secret manifest
      ansible.builtin.template:
        src: telemetry/victoria/vlagent-syslog-tls-secret.yaml.j2
        dest: "{{ hostvars['localhost']['k8s_client_share_path'] }}/telemetry/deployments/vlagent-syslog-tls-secret.yaml"
        mode: "{{ hostvars['localhost']['file_permissions_644'] }}"
      when: ps_syslog_tls_enabled | bool

    - name: Display syslog TLS certificate generation status
      ansible.builtin.debug:
        msg: >-
          Syslog TLS certificates generated.
          CA certificate: {{ syslog_tls_cert_dir }}/ca.crt
          Copy this CA cert to PowerScale clusters for TLS verification.
      when: ps_syslog_tls_enabled | bool

    - name: Populate PowerScale syslog configuration script
      ansible.builtin.template:
        src: "{{ configure_ps_syslog_template }}"
        dest: "{{ hostvars['localhost']['k8s_client_share_path'] }}/telemetry/deployments/configure_powerscale_syslog.sh"
        mode: "{{ hostvars['localhost']['file_permissions_755'] }}"
      vars:
        ps_syslog_tls_enabled: "{{ ps_syslog_tls_enabled }}"

    - name: Display PowerScale log configuration status
      ansible.builtin.debug:
        msg: >-
          PowerScale syslog configuration script staged on NFS share.
          During cloud-init, the script will configure rsyslog on all K8s nodes,
          open firewall port 514/udp, and forward PowerScale syslog to VLAgent.
          For complete PowerScale syslog configuration details, including manual
          PowerScale setup steps for both UDP and TLS modes, refer to Omnia documentation.
        verbosity: 2
